name: build

on:
  push:
    branches:
      - master
      - release/**

jobs:
  dist:
    name: Wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v2
      - uses: actions/setup-python@v5
      - run: |
          pip install wheel
          python setup.py bdist_wheel
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.sha }}
          path: dist/*
